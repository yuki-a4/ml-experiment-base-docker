services:
  ml:
    build:
      context: .
      dockerfile: Dockerfile
    image: rakuspa-ml:latest
    container_name: rakuspa-ml
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - SSH_AUTH_SOCK=/ssh-agent   # ← 追加
    volumes:
      - ../:/workspace
      - huggingface-cache:/root/.cache/huggingface
      - pip-cache:/root/.cache/pip
      - ${SSH_AUTH_SOCK}:/ssh-agent  # ← 追加
    ports:
      - "8888:8888"
    security_opt:
      - seccomp:unconfined
    ipc: host
    stdin_open: true
    tty: true
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token=''

volumes:
  huggingface-cache:
  pip-cache:
